<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none" stroke="#2E7D32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="pest-icon pest-rat">
  <style>
    .rat-tail { animation: ratTail 2s ease-in-out infinite; transform-origin: 20px 48px; }
    .rat-ear  { animation: earTwitch 3s ease-in-out infinite; transform-origin: 78px 22px; }
    @keyframes ratTail {
      0%,100% { transform: rotate(0deg); }
      50%     { transform: rotate(8deg); }
    }
    @keyframes earTwitch {
      0%,90%,100% { transform: rotate(0deg); }
      95%         { transform: rotate(-6deg); }
    }
  </style>
  <!-- Body -->
  <ellipse cx="60" cy="50" rx="30" ry="18" fill="#E8F5E9" stroke="#2E7D32"/>
  <!-- Head -->
  <ellipse cx="88" cy="40" rx="16" ry="13" fill="#E8F5E9" stroke="#2E7D32"/>
  <!-- Ear -->
  <ellipse cx="86" cy="28" rx="7" ry="5" fill="#C8E6C9" stroke="#2E7D32" class="rat-ear"/>
  <!-- Nose -->
  <circle cx="103" cy="40" r="2.5" fill="#C62828"/>
  <!-- Eye -->
  <circle cx="96" cy="35" r="2" fill="#1A1A1A"/>
  <circle cx="97" cy="34" r="0.6" fill="white"/>
  <!-- Whiskers -->
  <line x1="103" y1="38" x2="115" y2="34" stroke="#555" stroke-width="1"/>
  <line x1="103" y1="40" x2="116" y2="40" stroke="#555" stroke-width="1"/>
  <line x1="103" y1="42" x2="115" y2="45" stroke="#555" stroke-width="1"/>
  <!-- Legs -->
  <line x1="48" y1="64" x2="44" y2="74" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="58" y1="67" x2="56" y2="77" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="70" y1="67" x2="70" y2="77" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="80" y1="64" x2="83" y2="74" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Tail -->
  <path d="M30 55 Q18 58 12 50 Q8 44 14 40" stroke="#2E7D32" stroke-width="2" fill="none" class="rat-tail"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pest-icon pest-bedbug">
  <style>
    .bedbug-pulse { animation: bedPulse 2s ease-in-out infinite; transform-origin: 50px 50px; }
    @keyframes bedPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.06); }
    }
  </style>
  <g class="bedbug-pulse">
    <!-- Antennae -->
    <path d="M42 16 Q34 8 28 4" stroke="#1B5E20" stroke-width="1.5"/>
    <path d="M58 16 Q66 8 72 4" stroke="#1B5E20" stroke-width="1.5"/>
    <circle cx="28" cy="4" r="2" fill="#C62828" stroke="none"/>
    <circle cx="72" cy="4" r="2" fill="#C62828" stroke="none"/>
    <!-- Head -->
    <ellipse cx="50" cy="18" rx="10" ry="7" fill="#C8E6C9" stroke="#2E7D32"/>
    <circle cx="44" cy="16" r="2" fill="#1A1A1A"/>
    <circle cx="56" cy="16" r="2" fill="#1A1A1A"/>
    <!-- Main oval body (flat, shield-like) -->
    <ellipse cx="50" cy="52" rx="28" ry="32" fill="#C8E6C9" stroke="#2E7D32"/>
    <!-- Pronotum ridge -->
    <ellipse cx="50" cy="28" rx="20" ry="10" fill="#A5D6A7" stroke="#2E7D32"/>
    <!-- Abdominal segments -->
    <path d="M24 42 Q50 40 76 42" stroke="#2E7D32" stroke-width="1.2"/>
    <path d="M22 52 Q50 50 78 52" stroke="#2E7D32" stroke-width="1.2"/>
    <path d="M22 62 Q50 60 78 62" stroke="#2E7D32" stroke-width="1.2"/>
    <path d="M25 72 Q50 70 75 72" stroke="#2E7D32" stroke-width="1.2"/>
    <!-- Legs left -->
    <path d="M24 38 L10 30" stroke="#1B5E20" stroke-width="1.8"/>
    <path d="M23 50 L8 48" stroke="#1B5E20" stroke-width="1.8"/>
    <path d="M24 62 L10 68" stroke="#1B5E20" stroke-width="1.8"/>
    <!-- Legs right -->
    <path d="M76 38 L90 30" stroke="#1B5E20" stroke-width="1.8"/>
    <path d="M77 50 L92 48" stroke="#1B5E20" stroke-width="1.8"/>
    <path d="M76 62 L90 68" stroke="#1B5E20" stroke-width="1.8"/>
  </g>
</svg>
